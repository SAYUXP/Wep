body{

margin:0;
padding:0;
background:#f2f2f2;
display:flex;
flex-direction:column;
min-height:100vh;
}
header{
background:#222;
color:white;
padding:15px 20px;
font-size:24px;
text-align:center;
}
#main{
display:flex;
justify-content:center;
padding:10px;
flex:1;
}
#contenedor{
width:100%;
max-width:700px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);

flex-direction:column;
gap:15px;
}
#ad{
width:100%;
background:#e2e2e2;
text-align:center;
padding:12px;
border-radius:8px;

}
#cronometro{

#pregunta{

}
#opciones{

gap:10px;
}
.opcion{

font-size:18px;
border:none;
border-radius:8px;
background:#e2e2e2;
cursor:pointer;
}
.opcion:hover{
background:#d4d4d4;
}
#zonaInferior{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
align-items:start;
}
#misPuntos{
font-weight:bold;
font-size:18px;
}
#botones{
display:flex;
flex-direction:column;
gap:10px;
margin-top:10px;
}
#pausa, #registrar{
padding:10px;
border:none;
border-radius:8px;
background:#e2e2e2;
cursor:pointer;
width:130px;
}
#pausa:hover,#registrar:hover{
background:#d4d4d4;
}
#topContainer{
text-align:left;
}
#listaTopInside{
margin-top:5px;
padding-left:20px;
}
#listaTopInside li{
margin:3px 0;
font-weight:bold;
}
footer{
background:#222;
color:white;
padding:15px;
}
footer div{
display:flex;
overflow-x:auto;
white-space:nowrap;
gap:10px;
justify-content:center;
}
footer a{
color:white;
text-decoration:underline;
}
